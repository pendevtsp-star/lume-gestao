name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  django:
    name: Django checks e testes
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-2026-long-random-value-for-security-checks-9f84a21b
      DEBUG: "False"
      ENVIRONMENT: production
      LUME_STRICT_PRODUCTION: "False"
      ALLOWED_HOSTS: 127.0.0.1,localhost,testserver
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      DB_ENGINE: sqlite
      SECURE_SSL_REDIRECT: "False"
      GOOGLE_CALENDAR_SYNC_ENABLED: "True"
      WHATSAPP_DRY_RUN: "True"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        run: |
          python manage.py check
          python manage.py check --deploy

      - name: Run tests
        run: python manage.py test

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          LUME_APP_IMAGE=ghcr.io/pendevtsp-star/lume-gestao/app:ci \
          LUME_WHATSAPP_WEB_IMAGE=ghcr.io/pendevtsp-star/lume-gestao/whatsapp-web:ci \
          docker compose -f docker-compose.prod.yml config --quiet

  whatsapp-web:
    name: WhatsApp Web gateway build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whatsapp-web-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: whatsapp-web-gateway/package.json

      - name: Install dependencies
        run: |
          npm install --omit=dev

      - name: Syntax check
        run: |
          node --check src/server.js
