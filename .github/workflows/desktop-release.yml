name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: desktop-windows
            electron_args: --win --publish never
          - os: ubuntu-latest
            artifact_name: desktop-linux
            electron_args: --linux --publish never
          - os: macos-latest
            artifact_name: desktop-macos
            electron_args: --mac --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build local backend bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path desktop/backend-bin) { Remove-Item -Recurse -Force desktop/backend-bin }
          pyinstaller `
            --name lume-backend `
            --onedir `
            --distpath desktop/backend-bin `
            --workpath dist/pyinstaller-work `
            --specpath dist/pyinstaller-spec `
            --add-data "$env:GITHUB_WORKSPACE\templates;templates" `
            --add-data "$env:GITHUB_WORKSPACE\static;static" `
            --collect-all django `
            --collect-all rest_framework `
            --collect-all django_filters `
            --collect-submodules config `
            --collect-submodules accounts `
            --collect-submodules billing `
            --collect-submodules core `
            --collect-submodules fiscal `
            --collect-submodules mobile `
            --collect-submodules patients `
            --collect-submodules reports `
            --collect-submodules scheduling `
            --collect-submodules team `
            desktop/backend_entry.py

      - name: Build local backend bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf desktop/backend-bin
          pyinstaller \
            --name lume-backend \
            --onedir \
            --distpath desktop/backend-bin \
            --workpath dist/pyinstaller-work \
            --specpath dist/pyinstaller-spec \
            --add-data "${GITHUB_WORKSPACE}/templates:templates" \
            --add-data "${GITHUB_WORKSPACE}/static:static" \
            --collect-all django \
            --collect-all rest_framework \
            --collect-all django_filters \
            --collect-submodules config \
            --collect-submodules accounts \
            --collect-submodules billing \
            --collect-submodules core \
            --collect-submodules fiscal \
            --collect-submodules mobile \
            --collect-submodules patients \
            --collect-submodules reports \
            --collect-submodules scheduling \
            --collect-submodules team \
            desktop/backend_entry.py

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.electron_args }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/desktop/*.AppImage
            dist/desktop/*.blockmap
            dist/desktop/*.deb
            dist/desktop/*.dmg
            dist/desktop/*.exe
            dist/desktop/latest*.yml
            dist/desktop/*.zip
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          find release-artifacts -type f \
            \( -name "*.AppImage" \
            -o -name "*.blockmap" \
            -o -name "*.deb" \
            -o -name "*.dmg" \
            -o -name "*.exe" \
            -o -name "*.zip" \
            -o -name "latest*.yml" \) \
            -exec cp "{}" release-files/ \;
          ls -lh release-files

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          name: Lume Gestao ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          prerelease: true
          artifacts: release-files/*
          allowUpdates: true
          artifactErrorsFailBuild: true
          removeArtifacts: true
          replacesArtifacts: true
