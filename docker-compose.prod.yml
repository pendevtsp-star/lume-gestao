services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/media
      - ./data/staticfiles:/app/staticfiles
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1',8000),5); s.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build: .
    command: ["sh", "/app/scripts/start-worker.sh"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LUME_RUN_MIGRATIONS_ON_START: "False"
    volumes:
      - ./data/media:/app/media
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  postgres_data:
