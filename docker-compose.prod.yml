services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./data/media:/app/media
      - ./data/staticfiles:/app/staticfiles
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import http.client,os,sys; host=os.environ.get('LUME_HEALTHCHECK_HOST') or os.environ.get('ALLOWED_HOSTS','localhost').split(',')[0].strip(); c=http.client.HTTPConnection('127.0.0.1',8000,timeout=5); c.request('GET','/healthz/',headers={'Host':host,'X-Forwarded-Proto':'https'}); r=c.getresponse(); sys.exit(0 if r.status == 200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build: .
    command: ["sh", "/app/scripts/start-worker.sh"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LUME_RUN_MIGRATIONS_ON_START: "False"
    volumes:
      - ./data/media:/app/media
      - ./data/backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy

  whatsapp-web:
    build:
      context: .
      dockerfile: whatsapp-web-gateway/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WHATSAPP_WEB_SESSION_DIR: /data/session
      WHATSAPP_WEB_GATEWAY_PORT: "3020"
    volumes:
      - ./data/whatsapp-web:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3020/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
