services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lume}
      POSTGRES_USER: ${POSTGRES_USER:-lume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lume_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lume} -d ${POSTGRES_DB:-lume}"]
      interval: 5s
      timeout: 5s
      retries: 8

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-False}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
