services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lume}
      POSTGRES_USER: ${POSTGRES_USER:-lume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lume_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lume} -d ${POSTGRES_DB:-lume}"]
      interval: 5s
      timeout: 5s
      retries: 8

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: ["sh", "/app/scripts/start-worker.sh"]
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy

  whatsapp-web:
    build:
      context: .
      dockerfile: whatsapp-web-gateway/Dockerfile
    env_file:
      - .env
    environment:
      WHATSAPP_WEB_SESSION_DIR: /data/session
      WHATSAPP_WEB_GATEWAY_PORT: "3020"
    volumes:
      - ./data/whatsapp-web:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3020/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
