<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primeiro acesso | Lume Gestao</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/lume-favicon.svg">
  <link rel="shortcut icon" href="/static/images/lume-favicon.svg">
  <link rel="stylesheet" href="/static/css/app.css?v=20260628-first-access">
</head>
<body class="login-page">
  <main class="login-panel">
    <div class="login-brand">
      <span class="brand-mark">L</span>
      <div>
        <strong>Lume Gestao</strong>
        <small>Primeiro acesso seguro</small>
      </div>
    </div>

    <form method="post" class="form-panel">
      {% csrf_token %}
      <h1>Crie sua senha</h1>
      <p class="login-copy">Por seguranca, troque a senha temporaria antes de continuar. Use pelo menos 8 caracteres.</p>
      {% if form.non_field_errors %}
        <div class="form-errors">{{ form.non_field_errors }}</div>
      {% endif %}
      <label class="form-field">
        <span>Nova senha</span>
        <span class="password-control">
          {{ form.new_password1 }}
          <button class="password-toggle" type="button" aria-label="Mostrar senha" aria-pressed="false" data-password-toggle>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.4 12s3.3-6 9.6-6 9.6 6 9.6 6-3.3 6-9.6 6-9.6-6-9.6-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </span>
        {{ form.new_password1.errors }}
      </label>
      <label class="form-field">
        <span>Repetir nova senha</span>
        <span class="password-control">
          {{ form.new_password2 }}
          <button class="password-toggle" type="button" aria-label="Mostrar senha" aria-pressed="false" data-password-toggle>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.4 12s3.3-6 9.6-6 9.6 6 9.6 6-3.3 6-9.6 6-9.6-6-9.6-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </span>
        {{ form.new_password2.errors }}
      </label>
      <button class="button primary full" type="submit">Salvar senha e entrar</button>
    </form>
  </main>
  <script>
    document.querySelectorAll("[data-password-toggle]").forEach((button) => {
      const input = button.closest(".password-control")?.querySelector("input");
      if (!input) return;
      button.addEventListener("click", () => {
        const shouldShow = input.type === "password";
        input.type = shouldShow ? "text" : "password";
        button.setAttribute("aria-pressed", shouldShow ? "true" : "false");
        button.setAttribute("aria-label", shouldShow ? "Esconder senha" : "Mostrar senha");
      });
    });
  </script>
</body>
</html>
