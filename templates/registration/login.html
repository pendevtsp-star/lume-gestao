<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar | Lume Gestao</title>
  <link rel="stylesheet" href="/static/css/app.css?v=20260625-login-mobile">
</head>
<body class="login-page">
  <main class="login-panel">
    <div class="login-brand">
      <span class="brand-mark">L</span>
      <div>
        <strong>Lume Gestao</strong>
        <small>Clinica de fisioterapia e pilates</small>
      </div>
    </div>

    <form method="post" class="form-panel">
      {% csrf_token %}
      <h1>Entrar</h1>
      {% if form.non_field_errors %}
        <div class="form-errors">{{ form.non_field_errors }}</div>
      {% endif %}
      <label class="form-field">
        <span>Login</span>
        {{ form.username }}
      </label>
      <label class="form-field">
        <span>Senha</span>
        <span class="password-control">
          {{ form.password }}
          <button class="password-toggle" type="button" aria-label="Mostrar senha" aria-pressed="false" data-password-toggle>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2.4 12s3.3-6 9.6-6 9.6 6 9.6 6-3.3 6-9.6 6-9.6-6-9.6-6Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </span>
      </label>
      <button class="button primary full" type="submit">Entrar</button>
      <a class="login-help-link" href="{% url 'password_reset' %}">Esqueci minha senha</a>
    </form>
  </main>
  <script>
    const passwordToggle = document.querySelector("[data-password-toggle]");
    const passwordInput = document.querySelector("input[type='password']");

    if (passwordToggle && passwordInput) {
      passwordToggle.addEventListener("click", () => {
        const shouldShow = passwordInput.type === "password";
        passwordInput.type = shouldShow ? "text" : "password";
        passwordToggle.setAttribute("aria-pressed", shouldShow ? "true" : "false");
        passwordToggle.setAttribute("aria-label", shouldShow ? "Esconder senha" : "Mostrar senha");
      });
    }
  </script>
</body>
</html>
