<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova senha | Lume Gestao</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/lume-favicon.svg">
  <link rel="shortcut icon" href="/static/images/lume-favicon.svg">
  <link rel="stylesheet" href="/static/css/app.css?v=20260625-password-reset">
</head>
<body class="login-page">
  <main class="login-panel">
    <div class="login-brand">
      <span class="brand-mark">L</span>
      <div>
        <strong>Lume Gestao</strong>
        <small>Clinica de fisioterapia e pilates</small>
      </div>
    </div>
    <form method="post" class="form-panel">
      {% csrf_token %}
      <h1>Nova senha</h1>
      {% if validlink %}
        {% if form.non_field_errors %}
          <div class="form-errors">{{ form.non_field_errors }}</div>
        {% endif %}
        <label class="form-field">
          <span>{{ form.new_password1.label }}</span>
          {{ form.new_password1 }}
          {% for error in form.new_password1.errors %}<strong class="field-error">{{ error }}</strong>{% endfor %}
        </label>
        <label class="form-field">
          <span>{{ form.new_password2.label }}</span>
          {{ form.new_password2 }}
          {% for error in form.new_password2.errors %}<strong class="field-error">{{ error }}</strong>{% endfor %}
        </label>
        <button class="button primary full" type="submit">Salvar nova senha</button>
      {% else %}
        <p class="login-copy">Este link expirou ou ja foi utilizado.</p>
        <a class="button primary full" href="{% url 'password_reset' %}">Gerar novo link</a>
      {% endif %}
    </form>
  </main>
</body>
</html>
