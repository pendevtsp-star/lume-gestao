<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar senha | Lume Gestao</title>
  <link rel="stylesheet" href="/static/css/app.css?v=20260625-password-reset">
</head>
<body class="login-page">
  <main class="login-panel">
    <div class="login-brand">
      <span class="brand-mark">L</span>
      <div>
        <strong>Lume Gestao</strong>
        <small>Clinica de fisioterapia e pilates</small>
      </div>
    </div>

    <form method="post" class="form-panel">
      {% csrf_token %}
      <h1>Recuperar senha</h1>
      <p class="login-copy">Informe o e-mail cadastrado ou seu login.</p>
      {% if form.non_field_errors %}
        <div class="form-errors">{{ form.non_field_errors }}</div>
      {% endif %}
      <label class="form-field">
        <span>{{ form.identifier.label }}</span>
        {{ form.identifier }}
        {% for error in form.identifier.errors %}<strong class="field-error">{{ error }}</strong>{% endfor %}
      </label>
      <button class="button primary full" type="submit">Enviar link</button>
      <a class="login-help-link" href="{% url 'login' %}">Voltar ao login</a>
    </form>
  </main>
</body>
</html>
